<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Streaming Chat</title>
  <link rel="stylesheet" href="/src/client/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="chat-container">
    <div class="chat-messages" id="chat-messages">
      <!-- Welcome Message -->
      <div class="message system-message">
        <div class="message-content">
          Agent will think out loud and show reasoning
        </div>
      </div>
    </div>

    <form class="chat-input-form" id="chat-form">
      <input type="text" id="prompt-input" placeholder="Type a message..." autocomplete="off" required />
      <button type="submit" id="send-button" aria-label="Send message">
        <!-- SVG Send Icon -->
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path fill="currentColor" d="M2,21L23,12L2,3V10L17,12L2,14V21Z" />
        </svg>
      </button>
    </form>
  </div>

  <script type="module" src="/src/client/script.js"></script>
</body>

</html>
